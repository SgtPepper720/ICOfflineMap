<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Offline Church Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="/ICOfflineMap/manifest-v2.json">


  <link rel="stylesheet" href="/ICOfflineMap/leaflet/leaflet.css">
  <script src="/ICOfflineMap/leaflet/leaflet.js"></script>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
    #tileProgress {
      position: absolute;
      bottom: 60px;   /* slightly above the status box */
      right: 10px;
      z-index: 9999;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    #footerPanel {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(204,204,204,0.8);
      border-radius: 8px;
      padding: 8px 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      font-family: sans-serif;
    }

    #footerPanel > .footer-left,
    #footerPanel > .footer-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #menuToggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      transition: background .2s ease;
    }

    #menuToggle:hover {
      background: #f4f4f4;
    }

    #menuPanel {
      position: absolute;
      bottom: 58px;
      left: 10px;
      z-index: 10001;
      width: 240px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 8px;
      display: none;
      flex-direction: column;
    }

    #menuPanel button {
      width: 100%;
      margin: 4px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #111;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
    }

    #menuPanel button:hover {
      background: #f6f6f6;
    }

    #menuPanel.show {
      display: flex;
    }

    #logoOverlay {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10000;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #logoOverlay img {
      max-width: 120px;
      height: auto;
      display: block;
      opacity: 0.75;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.35));
    }
  </style>
</head>

<body>

  <div id="tileProgress" style="display:none; padding:10px;">
    <div id="tileProgressText">Preparing offline map…</div>
    <progress id="tileProgressBar" value="0" max="100"></progress>
  </div>

<div id="footerPanel">
  <div class="footer-left">
    <span id="offlineMessage">Checking offline map status…</span>
  </div>
  <div class="footer-right">
    <button id="menuToggle" aria-haspopup="true" aria-expanded="false" title="Open refresh menu">☰</button>
    <div id="menuPanel" role="menu" aria-labelledby="menuToggle">
      <button id="refreshTilesBtn" role="menuitem">Re-download map tiles</button>
      <button id="refreshChurchDataBtn" role="menuitem">Refresh church data</button>
      <button id="refreshAppShellBtn" role="menuitem">Refresh app shell</button>
      <button id="refreshPwaBtn" role="menuitem">Refresh full PWA</button>
    </div>
  </div>
</div>

<div id="logoOverlay">
  <img src="/ICOfflineMap/images/IC-Circle-Icon-filled.png" alt="Logo" />
</div>

  <div id="map"></div>

  <script>
    // -------------------------------
    // 1. Create the map
    // -------------------------------
    const map = L.map('map', {
      minZoom: 5,
      maxZoom: 14
    }).setView([52.5, -1.5], 6); // UK-centred default

    // -------------------------------
    // 2. Offline tile layer
    // -------------------------------
    L.tileLayer('/ICOfflineMap/tiles/{z}/{x}/{y}.png', {
      tileSize: 256,
      maxZoom: 14,
      maxNativeZoom: 10,
      minZoom: 5,
      attribution: 'Offline tiles'
    }).addTo(map);

    // -------------------------------
    // 3. Load churches.geojson
    // -------------------------------
    let churchLayer = null;

    async function loadChurches() {
      const source = '/ICOfflineMap/churches.geojson';
      const response = await fetch(source);
      const data = await response.json();

      if (churchLayer) {
        map.removeLayer(churchLayer);
      }

      churchLayer = L.geoJSON(data, {
        pointToLayer: (feature, latlng) => L.marker(latlng),
        onEachFeature: (feature, layer) => {
          const p = feature.properties;
          const churchName = p["Sort Name"] || "Unnamed church";
          const denom = p["Denom"] ? p["Denom"] : "unavailable";
          const postcode = p["Church/Organisation Profile: Church Postcode"] || "unavailable";

          const html = `
                <strong>Church:</strong> ${churchName}<br>
                <strong>Denomination:</strong> ${denom}<br>
                <strong>Postcode:</strong> ${postcode}
            `;

          layer.bindPopup(html);
        }
      }).addTo(map);
    }

    loadChurches();
  </script>

<script>
// script for page-side tile caching logic 
  async function getExpectedTileCount() {
    const response = await fetch("/ICOfflineMap/tiles.json");
    const tileList = await response.json();
    return tileList.length;
  }

  async function requestPersistentStorage() {
    if (!navigator.storage || !navigator.storage.persist) {
      console.warn("Persistent storage API not supported in this browser.");
      return false;
    }

    if (await navigator.storage.persisted()) {
      console.log("Storage already persisted.");
      return true;
    }

    const granted = await navigator.storage.persist();
    console.log("Persistent storage granted:", granted);
    return granted;
  }

  async function checkTileCache() {
    const cache = await caches.open("ic-offline-map-v1");
    const keys = await cache.keys();
    const expected = await getExpectedTileCount();

    const offlineMessage = document.getElementById("offlineMessage");

    const persisted = await requestPersistentStorage();
    if (!persisted) {
      console.warn("Persistent storage was not granted; cached tiles may be evicted under storage pressure.");
    }

    if (keys.filter(k => k.url.includes("/tiles/")).length >= expected) {
      offlineMessage.textContent = "✔ Offline map ready";
    } else {
      offlineMessage.textContent = "Downloading offline map…";
      precacheTiles();
    }
  }

  async function precacheTiles() {
    const cache = await caches.open("ic-offline-map-v1");

    const response = await fetch("/ICOfflineMap/tiles.json");
    const tileList = await response.json();

    let completed = 0;
    const total = tileList.length;

    showProgressBar(total);

    for (const url of tileList) {
      try {
        await cache.add(url);
      } catch (e) {
        console.log("Failed to cache tile:", url);
      }

      completed++;
      updateProgressBar(completed, total);
    }

    hideProgressBar();
    document.getElementById("offlineMessage").textContent = "✔ Offline map ready";
  }

</script>


  <script>
  // ⭐ Now register the service worker ⭐
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/ICOfflineMap/service-worker.js")
      .then(() => console.log("Service worker registered"));
  }

  checkTileCache();
  </script>



  <script>
  function showProgressBar(total) {
    const bar = document.getElementById("tileProgressBar");
    const box = document.getElementById("tileProgress");
    const text = document.getElementById("tileProgressText");
    console.log("Progress bar should now be visible");

    bar.value = 0;
    bar.max = total;
    text.textContent = `Caching ${total} tiles…`;
    box.style.display = "block";
  }

  function updateProgressBar(completed, total) {
    const bar = document.getElementById("tileProgressBar");
    const text = document.getElementById("tileProgressText");

    console.log("Progress bar updating");
    bar.value = completed;
    text.textContent = `Caching tiles: ${completed} / ${total}`;
  }

  function hideProgressBar() {
    const box = document.getElementById("tileProgress");
    box.style.display = "none";
  }


  async function deleteOnlyTiles(cache) {
  const keys = await cache.keys();

  for (const request of keys) {
    if (request.url.includes("/tiles/")) {
      await cache.delete(request);
    }
  }
}

  const SHELL_FILES = [
    "/ICOfflineMap/index.html",
    "/ICOfflineMap/leaflet/leaflet.css",
    "/ICOfflineMap/leaflet/leaflet.js",
    "/ICOfflineMap/service-worker.js",
    "/ICOfflineMap/manifest-v2.json"
  ];

  function toggleMenu() {
    const menu = document.getElementById("menuPanel");
    const toggle = document.getElementById("menuToggle");
    const isExpanded = menu.classList.contains("show");
    menu.classList.toggle("show", !isExpanded);
    toggle.setAttribute("aria-expanded", String(!isExpanded));
  }

  function closeMenu() {
    const menu = document.getElementById("menuPanel");
    const toggle = document.getElementById("menuToggle");
    menu.classList.remove("show");
    toggle.setAttribute("aria-expanded", "false");
  }

  function showStatus(message) {
    document.getElementById("offlineMessage").textContent = message;
  }

  async function refreshShellCache() {
    const cache = await caches.open("ic-offline-map-v1");

    for (const url of SHELL_FILES) {
      const cacheBustedUrl = `${url}?cache-bust=${Date.now()}`;
      const response = await fetch(cacheBustedUrl, { cache: "reload" });
      if (response.ok) {
        await cache.put(url, response.clone());
      }
    }
  }

  async function refreshTiles() {
    const cache = await caches.open("ic-offline-map-v1");
    await deleteOnlyTiles(cache);
    showStatus("Re-downloading offline map tiles…");
    await precacheTiles();
  }

  async function refreshChurchData() {
    const cache = await caches.open("ic-offline-map-v1");
    const url = "/ICOfflineMap/churches.geojson";

    try {
      showStatus("Refreshing church data…");
      const response = await fetch(`${url}?cache-bust=${Date.now()}`, { cache: "reload" });
      if (!response.ok) throw new Error("Church data fetch failed");
      await cache.put(url, response.clone());
      await loadChurches();
      showStatus("✔ Church data refreshed");
    } catch (error) {
      console.error(error);
      showStatus("Failed to refresh church data");
    }
  }

  async function refreshAppShell() {
    try {
      showStatus("Refreshing app shell…");
      await refreshShellCache();
      showStatus("✔ App shell updated");
      window.location.reload();
    } catch (error) {
      console.error(error);
      showStatus("Failed to refresh app shell");
    }
  }

  async function refreshFullPWA() {
    try {
      showStatus("Refreshing full PWA…");

      if (navigator.serviceWorker) {
        const registration = await navigator.serviceWorker.getRegistration();
        if (registration) {
          await registration.update();
        }
      }

      await refreshShellCache();
      const cacheNames = await caches.keys();
      for (const cacheName of cacheNames) {
        if (cacheName === "ic-offline-map-v1") {
          await caches.delete(cacheName);
        }
      }

      showStatus("✔ Full PWA refresh complete");
      window.location.reload();
    } catch (error) {
      console.error(error);
      showStatus("Failed to refresh full PWA");
    }
  }

  document.getElementById("menuToggle").addEventListener("click", event => {
    event.stopPropagation();
    toggleMenu();
  });

  document.getElementById("refreshTilesBtn").addEventListener("click", async () => {
    closeMenu();
    await refreshTiles();
  });

  document.getElementById("refreshChurchDataBtn").addEventListener("click", async () => {
    closeMenu();
    await refreshChurchData();
  });

  document.getElementById("refreshAppShellBtn").addEventListener("click", async () => {
    closeMenu();
    await refreshAppShell();
  });

  document.getElementById("refreshPwaBtn").addEventListener("click", async () => {
    closeMenu();
    await refreshFullPWA();
  });

  document.addEventListener("click", event => {
    const menu = document.getElementById("menuPanel");
    const toggle = document.getElementById("menuToggle");
    if (!menu.contains(event.target) && event.target !== toggle) {
      closeMenu();
    }
  });

  document.addEventListener("keydown", event => {
    if (event.key === "Escape") {
      closeMenu();
    }
  });

  </script>


</body>
</html>
