<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Offline Church Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="/ICOfflineMap/manifest-v2.json">


  <link rel="stylesheet" href="/ICOfflineMap/leaflet/leaflet.css">
  <script src="/ICOfflineMap/leaflet/leaflet.js"></script>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
    #tileProgress {
      position: absolute;
      top: 40px;
      left: 0;
      z-index: 9999;
      background: white;
      padding: 10px;
    }

  </style>
</head>

<body>

  <div id="tileProgress" style="display:none; padding:10px;">
    <div id="tileProgressText">Preparing offline map…</div>
    <progress id="tileProgressBar" value="0" max="100"></progress>
  </div>

<div id="offlineStatus" style="position:absolute; top:0; left:0; z-index:9999; background:white; padding:10px; font-family:sans-serif;">
  <span id="offlineMessage">Checking offline map status…</span>
  <button id="redownloadBtn" style="margin-left:10px;">Re-download tiles</button>
</div>


  <div id="map"></div>

  <script>
    // -------------------------------
    // 1. Create the map
    // -------------------------------
    const map = L.map('map', {
      minZoom: 5,
      maxZoom: 14
    }).setView([52.5, -1.5], 6); // UK-centred default

    // -------------------------------
    // 2. Offline tile layer
    // -------------------------------
    L.tileLayer('/ICOfflineMap/tiles/{z}/{x}/{y}.png', {
      tileSize: 256,
      maxZoom: 14,
      maxNativeZoom: 10,
      minZoom: 5,
      attribution: 'Offline tiles'
    }).addTo(map);

    // -------------------------------
    // 3. Load churches.geojson
    // -------------------------------
    fetch('/ICOfflineMap/churches.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          pointToLayer: (feature, latlng) => {
            return L.marker(latlng);
          },
          onEachFeature: (feature, layer) => {
            const p = feature.properties;

            const churchName = p["Sort Name"] || "Unnamed church";
            const denom = p["Denom"] ? p["Denom"] : "unavailable";
            const postcode = p["Church/Organisation Profile: Church Postcode"] || "unavailable";

            const html = `
                <strong>Church:</strong> ${churchName}<br>
                <strong>Denomination:</strong> ${denom}<br>
                <strong>Postcode:</strong> ${postcode}
            `;

            layer.bindPopup(html);
            }

        }).addTo(map);
      });
  </script>

<script>
// script for page-side tile caching logic 
  async function getExpectedTileCount() {
    const response = await fetch("/ICOfflineMap/tiles.json");
    const tileList = await response.json();
    return tileList.length;
  }

  async function checkTileCache() {
    const cache = await caches.open("ic-offline-map-v1");
    const keys = await cache.keys();
    const expected = await getExpectedTileCount();

    const offlineMessage = document.getElementById("offlineMessage");

    if (keys.filter(k => k.url.includes("/tiles/")).length >= expected) {
      offlineMessage.textContent = "✔ Offline map ready";
    } else {
      offlineMessage.textContent = "Downloading offline map…";
      precacheTiles();
    }
  }

  async function precacheTiles() {
    const cache = await caches.open("ic-offline-map-v1");

    const response = await fetch("/ICOfflineMap/tiles.json");
    const tileList = await response.json();

    let completed = 0;
    const total = tileList.length;

    showProgressBar(total);

    for (const url of tileList) {
      try {
        await cache.add(url);
      } catch (e) {
        console.log("Failed to cache tile:", url);
      }

      completed++;
      updateProgressBar(completed, total);
    }

    hideProgressBar();
    document.getElementById("offlineMessage").textContent = "✔ Offline map ready";
  }

  document.getElementById("redownloadBtn").addEventListener("click", async () => {
    const cache = await caches.open("ic-offline-map-v1");

    await deleteOnlyTiles(cache);

    document.getElementById("offlineMessage").textContent = "Re-downloading offline map…";
    precacheTiles();
  });
</script>


  <script>
  // ⭐ Now register the service worker ⭐
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/ICOfflineMap/service-worker.js")
      .then(() => console.log("Service worker registered"));
  }

  checkTileCache();
  </script>



  <script>
  function showProgressBar(total) {
    const bar = document.getElementById("tileProgressBar");
    const box = document.getElementById("tileProgress");
    const text = document.getElementById("tileProgressText");
    console.log("Progress bar should now be visible");

    bar.value = 0;
    bar.max = total;
    text.textContent = `Caching ${total} tiles…`;
    box.style.display = "block";
  }

  function updateProgressBar(completed, total) {
    const bar = document.getElementById("tileProgressBar");
    const text = document.getElementById("tileProgressText");

    console.log("Progress bar updating");
    bar.value = completed;
    text.textContent = `Caching tiles: ${completed} / ${total}`;
  }

  function hideProgressBar() {
    const box = document.getElementById("tileProgress");
    box.style.display = "none";
  }


  async function deleteOnlyTiles(cache) {
  const keys = await cache.keys();

  for (const request of keys) {
    if (request.url.includes("/tiles/")) {
      await cache.delete(request);
    }
  }
}

  </script>


</body>
</html>
